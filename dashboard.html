<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Query — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #EF4444;
      --blue:   #3B82F6;
      --green:  #22C55E;
      --yellow: #F59E0B;
      --bg:     #f8fafc;
      --bg2:    #ffffff;
      --border: #e2e8f0;
      --text:   #0f172a;
      --muted:  #64748b;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform 0.25s ease;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section {
      padding: 16px 12px 8px;
    }
    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 6px;
    }

    .profile-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1.5px solid transparent;
      position: relative;
    }
    .profile-item:hover { background: var(--bg); }
    .profile-item.active {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }
    .profile-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-count {
      font-size: 11px;
      color: var(--muted);
    }
    .profile-item.active .profile-count { color: #93c5fd; }

    .profile-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .profile-badge.shared {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .btn-new-profile {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 9px 10px;
      border: 1.5px dashed var(--border);
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-top: 4px;
    }
    .btn-new-profile:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: #eff6ff;
    }

    .sidebar-bottom {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 9px;
      cursor: pointer;
    }
    .user-item:hover { background: var(--bg); }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), #7c3aed);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-info .user-name { font-size: 13px; font-weight: 500; }
    .user-info .user-email { font-size: 11px; color: var(--muted); }

    /* ── MAIN ── */
    .main {
      margin-left: 260px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .search-wrap {
      flex: 1;
      max-width: 520px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: all 0.18s;
    }
    #search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
      background: var(--bg2);
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .btn-add:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }

    /* ── CONTENT ── */
    .content {
      padding: 28px;
      flex: 1;
    }

    .profile-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }
    .profile-header-left h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-header-left p {
      color: var(--muted);
      font-size: 13px;
    }

    .profile-actions {
      display: flex;
      gap: 8px;
    }
    .btn-icon {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg2);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s ease;
    }
    .btn-icon:hover { border-color: var(--blue); color: var(--blue); background: #eff6ff; }
    .btn-icon.danger:hover { border-color: var(--red); color: var(--red); background: #fef2f2; }

    /* Cartes de fiches */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      transition: all 0.18s ease;
      cursor: pointer;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--blue);
      opacity: 0;
      transition: opacity 0.18s;
      border-radius: 3px 0 0 3px;
    }
    .card:hover {
      border-color: #93c5fd;
      box-shadow: 0 4px 16px rgba(59,130,246,0.1);
      transform: translateY(-2px);
    }
    .card:hover::before { opacity: 1; }
    .card.pinned::before { opacity: 1; background: var(--yellow); }
    .card.pinned { border-color: #fde68a; }

    .card-content {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .card-content mark {
      background: #fef9c3;
      color: #854d0e;
      border-radius: 3px;
      padding: 0 2px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-date {
      font-size: 11px;
      color: var(--muted);
    }
    .card-btns {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .card:hover .card-btns { opacity: 1; }

    .card-btn {
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .card-btn:hover { background: var(--bg2); border-color: #93c5fd; color: var(--blue); }
    .card-btn.pin:hover { border-color: #fde68a; color: var(--yellow); }
    .card-btn.del:hover { border-color: #fca5a5; color: var(--red); }

    /* État vide */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      background: var(--bg2);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .empty-state p { font-size: 13px; }

    /* ── MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.show { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-close {
      width: 28px; height: 28px;
      border: none; background: none;
      color: var(--muted); cursor: pointer;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .modal-close:hover { background: var(--bg); color: var(--text); }

    .modal label { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; display: block; }
    .modal input[type="text"],
    .modal input[type="email"],
    .modal textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg2);
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
    }
    .modal textarea { height: 180px; resize: vertical; line-height: 1.6; }
    .modal input:focus, .modal textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .btn-cancel {
      padding: 10px 18px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg2);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { background: var(--bg); }
    .btn-save {
      padding: 10px 20px;
      border: none;
      border-radius: 9px;
      background: var(--blue);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-save:hover { background: #2563eb; }
    .btn-delete {
      padding: 10px 16px;
      border: 1.5px solid #fca5a5;
      border-radius: 9px;
      background: #fef2f2;
      color: var(--red);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-right: auto;
      transition: all 0.15s;
    }
    .btn-delete:hover { background: #fee2e2; border-color: var(--red); }

    /* Section membres */
    .members-section { margin-top: 16px; }
    .member-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .member-row:last-child { border-bottom: none; }
    .member-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--blue));
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }
    .member-name { flex: 1; font-size: 13px; font-weight: 500; }
    .member-role {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .member-role.owner { background: #eff6ff; color: #1d4ed8; }
    .member-role.editor { background: #f0fdf4; color: #16a34a; }
    .member-role.viewer { background: var(--bg); color: var(--muted); }

    /* Stats dans sidebar */
    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #e2e8f0;
      color: #475569;
      margin-left: auto;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .topbar { padding: 12px 16px; }
      .content { padding: 16px; }
      .cards-grid { grid-template-columns: 1fr; }
    }

    /* Couleurs de profil */
    .color-red    { background: #fef2f2; color: var(--red); }
    .color-blue   { background: #eff6ff; color: var(--blue); }
    .color-green  { background: #f0fdf4; color: var(--green); }
    .color-yellow { background: #fffbeb; color: var(--yellow); }
    .color-purple { background: #faf5ff; color: #7c3aed; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg xmlns="http://www.w3.org/2000/svg" height="34" viewBox="0 0 420 100">
      <rect x="0"  y="4"  width="68" height="26" rx="8" fill="#3B82F6"/>
      <rect x="12" y="37" width="68" height="26" rx="8" fill="#3B82F6" opacity="0.75"/>
      <rect x="24" y="70" width="42" height="26" rx="8" fill="#F59E0B"/>
      <text x="96" y="82" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="82" fill="#0f172a" letter-spacing="-2">Query</text>
    </svg>
  </div>

  <div class="sidebar-section" style="flex:1;overflow-y:auto;">
    <div class="sidebar-label">Mes profils</div>
    <div id="profiles-list"></div>
    <button class="btn-new-profile" onclick="openNewProfileModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouveau profil
    </button>
  </div>

  <div class="sidebar-bottom">
    <div class="user-item" onclick="window.location.href='login.html'">
      <div class="avatar" id="user-avatar">U</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Utilisateur</div>
        <div class="user-email" id="user-email"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="90e6ffe5e3d0f5e8f5fde0fcf5bef3fffd">[email&#160;protected]</a></div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Rechercher dans vos fiches..." oninput="renderCards()">
    </div>
    <button class="btn-add" onclick="openNewCardModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouvelle fiche
    </button>
  </div>

  <div class="content">
    <div class="profile-header">
      <div class="profile-header-left">
        <h2 id="profile-title">Profil par défaut</h2>
        <p id="profile-subtitle">0 fiche</p>
      </div>
      <div class="profile-actions" id="profile-actions"></div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>
</main>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAllModals(event)">

  <!-- Modal : nouvelle fiche / édition -->
  <div class="modal" id="modal-card" onclick="e=>e.stopPropagation()">
    <div class="modal-title">
      <span id="modal-card-title">✏️ Nouvelle fiche</span>
      <button class="modal-close" onclick="closeModal('modal-card')">✕</button>
    </div>
    <label>Contenu de la fiche</label>
    <textarea id="card-content" placeholder="Écrivez vos notes, liens, idées..."></textarea>
    <div class="modal-footer">
      <button class="btn-delete" id="btn-delete-card" onclick="deleteCard()" style="display:none">🗑️ Supprimer</button>
      <button class="btn-cancel" onclick="closeModal('modal-card')">Annuler</button>
      <button class="btn-save" onclick="saveCard()">✅ Sauvegarder</button>
    </div>
  </div>

  <!-- Modal : nouveau profil -->
  <div class="modal" id="modal-profile" onclick="e=>e.stopPropagation()">
    <div class="modal-title">
      <span>📁 Nouveau profil</span>
      <button class="modal-close" onclick="closeModal('modal-profile')">✕</button>
    </div>
    <label>Nom du profil</label>
    <input type="text" id="profile-name-input" placeholder="Ex : Travail, Études, Perso...">
    <label>Type</label>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;color:var(--text);font-weight:400;">
        <input type="radio" name="profile-type" value="personal" checked> Privé
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;color:var(--text);font-weight:400;">
        <input type="radio" name="profile-type" value="shared"> Partagé
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-profile')">Annuler</button>
      <button class="btn-save" onclick="createProfile()">✅ Créer</button>
    </div>
  </div>

  <!-- Modal : partage profil -->
  <div class="modal" id="modal-share" onclick="e=>e.stopPropagation()">
    <div class="modal-title">
      <span>👥 Gérer les membres</span>
      <button class="modal-close" onclick="closeModal('modal-share')">✕</button>
    </div>
    <label>Inviter par email</label>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <input type="email" id="invite-email" placeholder="ami@exemple.com" style="flex:1;margin-bottom:0;">
      <button class="btn-save" style="white-space:nowrap;padding:10px 14px;" onclick="inviteMember()">Inviter</button>
    </div>
    <div class="members-section" id="members-list"></div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabase = createClient(
  'https://rujpyxapacsjwpnsvwre.supabase.co',
  'sb_publishable_SoXuO9BwCXGnpUzzFZAu2w_gbjiJr-R'
)

// ── ÉTAT ──
let profiles = {};
let currentProfileId = null;
let editingCardId = null;
let currentUser = null;

// ── INIT ──
async function init() {
  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  // Afficher infos utilisateur
  const name = currentUser.user_metadata?.display_name || currentUser.email.split('@')[0];
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-email').textContent = currentUser.email;
  document.getElementById('user-avatar').textContent = name[0].toUpperCase();

  await loadProfiles();
}

// ── CHARGEMENT DEPUIS SUPABASE ──
async function loadProfiles() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*, cards(*)')
    .order('created_at', { ascending: true })

  if (error) { console.error(error); return; }

  profiles = {};
  const colors = ['blue','red','green','yellow','purple'];
  data.forEach((p, i) => {
    profiles[p.id] = {
      ...p,
      color: colors[i % colors.length],
      entries: (p.cards || []).map(c => ({
        id: c.id,
        content: c.content,
        pinned: c.pinned,
        date: c.created_at
      }))
    };
  });

  // Si aucun profil, en créer un par défaut
  if (data.length === 0) {
    await createDefaultProfile();
    return;
  }

  const firstId = Object.keys(profiles)[0];
  selectProfile(firstId);
}

async function createDefaultProfile() {
  const { data, error } = await supabase.from('profiles').insert({
    user_id: currentUser.id,
    name: 'Profil par défaut',
    type: 'personal',
    emoji: '📁'
  }).select().single()
  if (!error) {
    profiles[data.id] = { ...data, color: 'blue', entries: [] };
    selectProfile(data.id);
  }
}

// ── PROFILS ──
function renderProfiles() {
  const list = document.getElementById('profiles-list');
  list.innerHTML = '';
  Object.values(profiles).forEach(p => {
    const isActive = p.id === currentProfileId;
    const count = p.entries.length;
    list.innerHTML += `
      <div class="profile-item ${isActive ? 'active' : ''}" onclick="selectProfile('${p.id}')">
        <div class="profile-icon color-${p.color}">${p.emoji || '📁'}</div>
        <div class="profile-info">
          <div class="profile-name">${escHtml(p.name)}</div>
          <div class="profile-count">${count} fiche${count !== 1 ? 's' : ''}</div>
        </div>
        ${p.type === 'shared' ? '<span class="profile-badge shared">Partagé</span>' : ''}
      </div>`;
  });
}

window.selectProfile = function(id) {
  currentProfileId = id;
  renderProfiles();
  renderHeader();
  renderCards();
}

function renderHeader() {
  const p = profiles[currentProfileId];
  if (!p) return;
  document.getElementById('profile-title').textContent = p.emoji + ' ' + p.name;
  const count = p.entries.length;
  document.getElementById('profile-subtitle').textContent =
    `${count} fiche${count !== 1 ? 's' : ''}${p.type === 'shared' ? ' · Profil partagé' : ''}`;

  const actions = document.getElementById('profile-actions');
  actions.innerHTML = '';
  if (p.type === 'shared') {
    actions.innerHTML += `<button class="btn-icon" onclick="openShareModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Membres</button>`;
  }
  actions.innerHTML += `<button class="btn-icon" onclick="exportProfile()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Exporter</button>`;
  actions.innerHTML += `<button class="btn-icon danger" onclick="deleteProfile()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Supprimer</button>`;
}

// ── FICHES ──
function renderCards() {
  const p = profiles[currentProfileId];
  if (!p) return;
  const q = document.getElementById('search').value.trim().toLowerCase();
  const grid = document.getElementById('cards-grid');

  let entries = [...p.entries].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0));
  if (q) entries = entries.filter(e => e.content.toLowerCase().includes(q));

  if (entries.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="emoji">${q?'🔍':'✨'}</div><h3>${q?'Aucun résultat':'Aucune fiche pour le moment'}</h3><p>${q?'Essaie un autre mot-clé.':'Clique sur "Nouvelle fiche" pour commencer.'}</p></div>`;
    return;
  }

  grid.innerHTML = entries.map(e => {
    let content = escHtml(e.content);
    if (q) content = content.replace(new RegExp(`(${escReg(q)})`, 'gi'), '<mark>$1</mark>');
    return `
    <div class="card ${e.pinned?'pinned':''}" onclick="openEditCardModal('${e.id}')">
      <div class="card-content">${content}</div>
      <div class="card-footer">
        <span class="card-date">${formatDate(e.date)}</span>
        <div class="card-btns">
          <button class="card-btn pin" title="${e.pinned?'Désépingler':'Épingler'}" onclick="togglePin(event,'${e.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="${e.pinned?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </button>
          <button class="card-btn" title="Modifier" onclick="openEditCardModal('${e.id}');event.stopPropagation()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.openNewCardModal = function() {
  editingCardId = null;
  document.getElementById('modal-card-title').textContent = '✏️ Nouvelle fiche';
  document.getElementById('card-content').value = '';
  document.getElementById('btn-delete-card').style.display = 'none';
  showModal('modal-card');
  setTimeout(() => document.getElementById('card-content').focus(), 50);
}

window.openEditCardModal = function(id) {
  const p = profiles[currentProfileId];
  const card = p.entries.find(e => e.id === id);
  if (!card) return;
  editingCardId = id;
  document.getElementById('modal-card-title').textContent = '✏️ Modifier la fiche';
  document.getElementById('card-content').value = card.content;
  document.getElementById('btn-delete-card').style.display = 'block';
  showModal('modal-card');
  setTimeout(() => document.getElementById('card-content').focus(), 50);
}

window.saveCard = async function() {
  const content = document.getElementById('card-content').value.trim();
  if (!content) return;
  const p = profiles[currentProfileId];

  if (editingCardId) {
    const { error } = await supabase.from('cards').update({ content }).eq('id', editingCardId)
    if (!error) {
      const card = p.entries.find(e => e.id === editingCardId);
      if (card) card.content = content;
    }
  } else {
    const { data, error } = await supabase.from('cards').insert({
      content,
      profile_id: currentProfileId,
      pinned: false
    }).select().single()
    if (!error) {
      p.entries.unshift({ id: data.id, content, pinned: false, date: data.created_at });
    }
  }
  closeModal();
  renderProfiles();
  renderHeader();
  renderCards();
}

window.deleteCard = async function() {
  if (!confirm('Supprimer cette fiche ?')) return;
  const { error } = await supabase.from('cards').delete().eq('id', editingCardId)
  if (!error) {
    const p = profiles[currentProfileId];
    p.entries = p.entries.filter(e => e.id !== editingCardId);
  }
  closeModal();
  renderProfiles();
  renderHeader();
  renderCards();
}

window.togglePin = async function(event, id) {
  event.stopPropagation();
  const p = profiles[currentProfileId];
  const card = p.entries.find(e => e.id === id);
  if (!card) return;
  card.pinned = !card.pinned;
  await supabase.from('cards').update({ pinned: card.pinned }).eq('id', id)
  renderCards();
}

// ── PROFILS ──
window.openNewProfileModal = function() {
  document.getElementById('profile-name-input').value = '';
  showModal('modal-profile');
  setTimeout(() => document.getElementById('profile-name-input').focus(), 50);
}

window.createProfile = async function() {
  const name = document.getElementById('profile-name-input').value.trim();
  if (!name) return;
  const type = document.querySelector('input[name="profile-type"]:checked').value;
  const emojis = ['📋','💡','🎯','🔬','📚','🛠️','💼','🌟'];
  const colors = ['red','green','yellow','purple','blue'];
  const emoji = emojis[Object.keys(profiles).length % emojis.length];
  const color = colors[Object.keys(profiles).length % colors.length];

  const { data, error } = await supabase.from('profiles').insert({
    user_id: currentUser.id,
    name, type, emoji
  }).select().single()

  if (!error) {
    profiles[data.id] = { ...data, color, entries: [] };
    closeModal();
    renderProfiles();
    selectProfile(data.id);
  }
}

window.deleteProfile = async function() {
  const p = profiles[currentProfileId];
  if (!confirm(`Supprimer le profil "${p.name}" et toutes ses fiches ?`)) return;
  const { error } = await supabase.from('profiles').delete().eq('id', currentProfileId)
  if (!error) {
    delete profiles[currentProfileId];
    const firstId = Object.keys(profiles)[0];
    if (firstId) selectProfile(firstId);
    else { profiles = {}; renderProfiles(); renderHeader(); renderCards(); }
  }
}

// ── PARTAGE ──
window.openShareModal = async function() {
  const { data: members } = await supabase
    .from('profile_members')
    .select('*, user:user_id(email)')
    .eq('profile_id', currentProfileId)

  const list = document.getElementById('members-list');
  list.innerHTML = `
    <div class="member-row">
      <div class="member-avatar">${currentUser.email[0].toUpperCase()}</div>
      <div class="member-name">${escHtml(currentUser.user_metadata?.display_name || currentUser.email)}<br>
        <span style="font-size:11px;color:var(--muted)">${currentUser.email}</span></div>
      <span class="member-role owner">Propriétaire</span>
    </div>` +
    (members || []).map(m => `
    <div class="member-row">
      <div class="member-avatar">${m.user?.email?.[0]?.toUpperCase() || '?'}</div>
      <div class="member-name">${escHtml(m.user?.email || '')}</div>
      <span class="member-role ${m.role}">${m.role === 'editor' ? 'Éditeur' : 'Lecteur'}</span>
    </div>`).join('');
  showModal('modal-share');
}

window.inviteMember = async function() {
  const email = document.getElementById('invite-email').value.trim();
  if (!email) return;
  // Chercher l'utilisateur par email
  const { data: users } = await supabase
    .from('profiles')
    .select('user_id')
    .eq('user_id', email)
    .limit(1)
  // Note: l'invitation complète nécessite une Edge Function Supabase
  // Pour l'instant on insère directement si on a l'ID
  alert(`Invitation envoyée à ${email} ! (Fonctionnalité complète disponible après configuration des Edge Functions Supabase)`)

// ── EXPORT ──
window.exportProfile = function() {
  const p = profiles[currentProfileId];
  const md = `# ${p.name}\n\n` +
    p.entries.map((e,i) => `## Fiche ${i+1}\n\n${e.content}\n\n---\n`).join('\n');
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${p.name.replace(/\s+/g,'_')}.md`;
  a.click();
}

document.getElementById('user-avatar').parentElement.onclick = async function() {
  if (confirm('Se déconnecter ?')) {
    await supabase.auth.signOut()
    window.location.href = 'login.html'
  }
}

// ── UTILS ──
function showModal(id) {
  document.getElementById('overlay').classList.add('show');
  document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}
window.closeModal = function() {
  document.getElementById('overlay').classList.remove('show');
}
window.closeAllModals = function(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
window.renderCards = renderCards;

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escReg(t) {
  return t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}
function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    document.getElementById('search').focus();
    e.preventDefault();
  }
});

init();
