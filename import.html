<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Query — Knowledge Base</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<!-- PWA iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Query">
<link rel="apple-touch-icon" href="icons/icon180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon180.png">
<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon192.png">
<link rel="icon" type="image/png" href="query_icon_1024.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════════════════ */
:root {
  --c-bg:       #f5f5f0;
  --c-sidebar:  #ffffff;
  --c-surface:  #ffffff;
  --c-surf2:    #fafaf8;
  --c-border:   #e8e8e3;
  --c-border2:  #d4d4cc;
  --c-text:     #1c1c1a;
  --c-text2:    #6b6b63;
  --c-text3:    #a8a8a0;
  --c-accent:   #2563eb;
  --c-accent-h: #1d4ed8;
  --c-accent-l: #eff6ff;
  --c-accent-b: #bfdbfe;
  --c-ok:       #16a34a;
  --c-err:      #dc2626;
  --c-pin:      #2563eb;
  --c-pin-bg:   #eff6ff;
  /* Card color palette (pastel backgrounds + subtle border) */
  --cc-yellow-bg: #fef9c3; --cc-yellow-bd: #fde68a;
  --cc-green-bg:  #dcfce7; --cc-green-bd:  #bbf7d0;
  --cc-blue-bg:   #dbeafe; --cc-blue-bd:   #bfdbfe;
  --cc-pink-bg:   #fce7f3; --cc-pink-bd:   #fbcfe8;
  --cc-purple-bg: #f3e8ff; --cc-purple-bd: #e9d5ff;
  --cc-orange-bg: #ffedd5; --cc-orange-bd: #fed7aa;
  --cc-gray-bg:   #f1f5f9; --cc-gray-bd:   #e2e8f0;
  --s-sm: 0 1px 2px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);
  --s-md: 0 4px 8px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --s-lg: 0 16px 32px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.06);
  --sidebar-w: 240px;
  --topbar-h:  56px;
  --r: 8px;
  --r2: 12px;
}

body.dark {
  --c-bg:       #141414;
  --c-sidebar:  #1c1c1c;
  --c-surface:  #252525;
  --c-surf2:    #1c1c1c;
  --c-border:   #383838;
  --c-border2:  #525252;
  --c-text:     #f2f2f2;
  --c-text2:    #b4b4b4;
  --c-text3:    #757575;
  --c-accent-l: rgba(59,130,246,.16);
  --c-accent-b: rgba(59,130,246,.42);
  --c-pin-bg:   rgba(59,130,246,.16);
  /* Card colors — enough opacity to be visible on dark surfaces */
  --cc-yellow-bg: rgba(234,179,8,.20);  --cc-yellow-bd: rgba(234,179,8,.48);
  --cc-green-bg:  rgba(34,197,94,.16);  --cc-green-bd:  rgba(34,197,94,.42);
  --cc-blue-bg:   rgba(59,130,246,.18); --cc-blue-bd:   rgba(59,130,246,.48);
  --cc-pink-bg:   rgba(236,72,153,.18); --cc-pink-bd:   rgba(236,72,153,.46);
  --cc-purple-bg: rgba(168,85,247,.18); --cc-purple-bd: rgba(168,85,247,.46);
  --cc-orange-bg: rgba(249,115,22,.18); --cc-orange-bd: rgba(249,115,22,.46);
  --cc-gray-bg:   rgba(180,180,180,.14); --cc-gray-bd:  rgba(180,180,180,.36);
  --s-sm: 0 1px 2px rgba(0,0,0,.35);
  --s-md: 0 4px 8px rgba(0,0,0,.50);
  --s-lg: 0 16px 32px rgba(0,0,0,.60);
}

body.custom {
  --c-bg:      var(--cx-bg);
  --c-sidebar: var(--cx-panel);
  --c-surface: var(--cx-card);
  --c-surf2:   var(--cx-card);
  --c-border:  rgba(255,255,255,.12);
  --c-border2: rgba(255,255,255,.2);
  --c-text:    #fff;
  --c-text2:   rgba(255,255,255,.65);
  --c-text3:   rgba(255,255,255,.3);
  --c-accent-l: rgba(255,255,255,.08);
  --c-accent-b: rgba(255,255,255,.2);
  --c-pin-bg:  rgba(37,99,235,.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  transition: background .2s, color .2s;
  overflow-x: hidden;
}

/* ════════════════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════════════════ */
#app { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ─── */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--c-sidebar);
  border-right: 1px solid var(--c-border);
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0 auto 0 0;
  z-index: 200;
  transition: background .2s, border-color .2s, transform .28s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}

.sb-head {
  padding: 0 12px;
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--c-border);
  flex-shrink: 0;
}
.sb-logo { height: 22px; display: none; }
.sb-logo.on { display: block; }

.sb-section { padding: 8px 8px 4px; flex-shrink: 0; }
.sb-sec-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--c-text3);
  padding: 0 8px;
  margin-bottom: 2px;
}

#profileList {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-height: 0;
}
#profileList::-webkit-scrollbar { width: 4px; }
#profileList::-webkit-scrollbar-thumb { background: var(--c-border2); border-radius: 4px; }

.p-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border-radius: var(--r);
  cursor: pointer;
  color: var(--c-text2);
  font-size: 13px;
  font-weight: 450;
  border: 1px solid transparent;
  transition: background .12s, color .12s, border-color .12s;
  min-width: 0;
}
.p-row:hover { background: var(--c-surf2); color: var(--c-text); }
.p-row.active {
  background: var(--c-accent-l);
  color: var(--c-accent);
  border-color: var(--c-accent-b);
  font-weight: 500;
}
.p-row-icon { font-size: 13px; flex-shrink: 0; }
.p-row-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-row-count {
  font-size: 10px;
  font-family: 'Geist Mono', monospace;
  color: var(--c-text3);
  background: var(--c-border);
  border-radius: 20px;
  padding: 1px 6px;
  flex-shrink: 0;
}
.p-row.active .p-row-count { background: var(--c-accent-b); color: var(--c-accent); }
.p-row-del {
  opacity: 0;
  width: 18px; height: 18px;
  border: none; background: transparent;
  color: var(--c-text3);
  cursor: pointer;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .12s;
}
.p-row:hover .p-row-del { opacity: 1; }
.p-row-del:hover { background: #fee2e2; color: var(--c-err); transform: none; box-shadow: none; }
.p-row-del svg { width: 10px; height: 10px; pointer-events: none; }

/* Profile drag-to-reorder handle — only visible in edit mode */
.p-row-drag { display: none; flex-shrink: 0; width: 14px; height: 14px; align-items: center; justify-content: center; cursor: grab; color: var(--c-text3); border-radius: 3px; opacity: 0; transition: opacity .12s; }
.p-row-drag svg { width: 10px; height: 10px; pointer-events: none; }
.p-row-drag:active { cursor: grabbing; }
#profileList.edit-mode .p-row-drag { display: flex; }
#profileList.edit-mode .p-row:hover .p-row-drag { opacity: 0.7; }
#profileList.edit-mode .p-row-drag:hover { opacity: 1; background: var(--c-surf2); }
.p-row.dragging-profile { opacity: 0.35; }
.p-row.drag-over-before { border-top: 2px solid var(--c-accent) !important; }
.p-row.drag-over-after { border-bottom: 2px solid var(--c-accent) !important; }

.sb-add-profile {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  margin: 4px 0 0 0;
  border-radius: var(--r);
  border: 1px dashed var(--c-border2);
  background: transparent;
  color: var(--c-text3);
  font-size: 12px;
  font-family: 'Geist', sans-serif;
  cursor: pointer;
  transition: all .15s;
  width: 100%;
  text-align: left;
}
.sb-add-profile:hover {
  color: var(--c-accent);
  border-color: var(--c-accent-b);
  background: var(--c-accent-l);
  transform: none; box-shadow: none;
}

.sb-divider { height: 1px; background: var(--c-border); margin: 4px 8px; flex-shrink: 0; }

.sb-bottom { padding: 8px; flex-shrink: 0; }

.sb-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 8px;
  border-radius: var(--r);
  border: none;
  background: transparent;
  color: var(--c-text2);
  font-size: 13px;
  font-family: 'Geist', sans-serif;
  cursor: pointer;
  text-align: left;
  transition: background .12s, color .12s;
}
.sb-btn:hover { background: var(--c-surf2); color: var(--c-text); transform: none; box-shadow: none; }
.sb-btn svg { flex-shrink: 0; opacity: .6; }
.sb-btn:hover svg { opacity: 1; }

/* Theme switcher in sidebar */
.theme-row {
  display: flex;
  align-items: center;
  padding: 4px 8px 8px;
  gap: 6px;
}
.theme-row-label {
  font-size: 12px;
  color: var(--c-text3);
  flex: 1;
}
.theme-dots { display: flex; gap: 4px; }
.tdot {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--c-border);
  background: var(--c-surf2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--c-text3);
  transition: all .12s;
  position: relative;
}
.tdot svg { width: 12px; height: 12px; }
.tdot:hover { border-color: var(--c-accent); color: var(--c-accent); transform: scale(1.1); box-shadow: none; }
.tdot.on { border-color: var(--c-accent); background: var(--c-accent-l); color: var(--c-accent); }
.cp-wrap { position: relative; overflow: hidden; }
.cp-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; border: none; width: 100%; height: 100%; }
.cdot { width: 14px; height: 14px; border-radius: 50%; pointer-events: none; }

/* ─── MAIN ─── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-width: 0;
}

/* ─── TOPBAR ─── */
#topbar {
  height: var(--topbar-h);
  background: var(--c-sidebar);
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  transition: background .2s, border-color .2s;
}

#menuToggle {
  display: none;
  width: 32px; height: 32px;
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  background: var(--c-surface);
  color: var(--c-text2);
  cursor: pointer;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
#menuToggle svg { pointer-events: none; }

.topbar-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 500;
  color: var(--c-text);
  flex-shrink: 0;
}
.topbar-breadcrumb-app { color: var(--c-text3); font-weight: 400; }
.topbar-breadcrumb-sep { color: var(--c-text3); font-size: 16px; line-height: 1; }

.topbar-search {
  flex: 1;
  max-width: 400px;
  position: relative;
  margin: 0 16px;
}
.topbar-search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--c-text3); pointer-events: none;
}
#search {
  width: 100%;
  padding: 7px 12px 7px 32px;
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  font-size: 13px;
  font-family: 'Geist', sans-serif;
  color: var(--c-text);
  outline: none;
  transition: all .15s;
}
#search:focus {
  background: var(--c-surface);
  border-color: var(--c-accent);
  box-shadow: 0 0 0 3px var(--c-accent-l);
}
#search::placeholder { color: var(--c-text3); }

.topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

#resultsCounter {
  font-size: 11px;
  font-family: 'Geist Mono', monospace;
  color: var(--c-text3);
  background: var(--c-surf2);
  border: 1px solid var(--c-border);
  border-radius: 20px;
  padding: 3px 9px;
  white-space: nowrap;
}

.tb-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: var(--r);
  border: 1px solid var(--c-border);
  background: var(--c-surface);
  color: var(--c-text2);
  font-size: 13px;
  font-weight: 450;
  font-family: 'Geist', sans-serif;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--c-surf2); border-color: var(--c-border2); color: var(--c-text); transform: none; box-shadow: var(--s-sm); }

#addBtn {
  background: var(--c-accent);
  border-color: var(--c-accent);
  color: #fff;
  font-weight: 500;
  padding: 7px 14px;
  box-shadow: 0 1px 3px rgba(37,99,235,.3);
}
#addBtn:hover { background: var(--c-accent-h); border-color: var(--c-accent-h); color: #fff; box-shadow: 0 3px 8px rgba(37,99,235,.4); }

/* ─── CONTENT ─── */
#content { padding: 24px 28px; flex: 1; }

.content-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--c-border);
}
.content-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--c-text);
  flex: 1;
}
.content-subtitle {
  font-size: 12px;
  font-family: 'Geist Mono', monospace;
  color: var(--c-text3);
}

/* ─── CARDS ─── */
#results {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-start;
  align-content: flex-start;
  position: relative;
}
#results > .card {
  /* Default card width — gives roughly the same visual as the old auto-fill grid */
  flex: 1 1 280px;
  min-width: 260px;
  max-width: 420px;
}
/* Cards with a stored custom size use inline style width/height set in JS,
   which overrides the flex defaults above via specificity + inline style. */
#results > .card[data-sized="1"] {
  flex: 0 0 auto;      /* don't grow/shrink; respect inline width exactly */
  max-width: none;
}
/* Freely positioned card — lifted out of the flex flow, placed at absolute x/y */
#results > .card[data-positioned="1"] {
  position: absolute;
  z-index: 2;
  flex: none;
  max-width: none;
  width: 300px;        /* fallback width; overridden by entry.w inline style */
  box-shadow: var(--s-md);
}

.card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r2);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: var(--s-sm);
  transition: border-color .15s, box-shadow .15s, transform .15s;
  animation: cardIn .18s ease both;
  position: relative;
  cursor: default;
}
.card:hover {
  border-color: var(--c-border2);
  box-shadow: var(--s-md);
  transform: translateY(-2px);
}
.card.pinned { border-left: 3px solid var(--c-pin); }

/* Card colors (pastel backgrounds) */
.card.color-yellow { background: var(--cc-yellow-bg); border-color: var(--cc-yellow-bd); }
.card.color-green  { background: var(--cc-green-bg);  border-color: var(--cc-green-bd); }
.card.color-blue   { background: var(--cc-blue-bg);   border-color: var(--cc-blue-bd); }
.card.color-pink   { background: var(--cc-pink-bg);   border-color: var(--cc-pink-bd); }
.card.color-purple { background: var(--cc-purple-bg); border-color: var(--cc-purple-bd); }
.card.color-orange { background: var(--cc-orange-bg); border-color: var(--cc-orange-bd); }
.card.color-gray   { background: var(--cc-gray-bg);   border-color: var(--cc-gray-bd); }
.card[class*="color-"]:hover { border-color: var(--c-border2); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-pin-label {
  display: none;
  position: absolute;
  top: -1px; right: 10px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--c-pin);
  font-family: 'Geist Mono', monospace;
}
.card.pinned .card-pin-label { display: block; }

.card-body {
  flex: 1;
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--c-text);
  word-break: break-word;
  overflow-wrap: break-word;
}
/* Preserve wrapping only for plain text cards (no HTML block elements) */
.card-body.plain-text { white-space: pre-wrap; }
.card-body span[style], .card-body b, .card-body i, .card-body u { display: inline; }

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-date {
  font-size: 10px;
  font-family: 'Geist Mono', monospace;
  color: var(--c-text3);
}
.card-actions {
  display: flex;
  gap: 3px;
  opacity: 0;
  transition: opacity .12s;
}
.card:hover .card-actions { opacity: 1; }

.card-btn {
  width: 26px; height: 26px;
  border: 1px solid var(--c-border);
  border-radius: 6px;
  background: var(--c-surf2);
  color: var(--c-text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
  flex-shrink: 0;
}
.card-btn:hover { border-color: var(--c-accent); background: var(--c-accent-l); color: var(--c-accent); transform: scale(1.08); box-shadow: none; }
.card-btn.pin-on { color: var(--c-pin); border-color: var(--c-pin); background: var(--c-pin-bg); opacity: 1; }
.card-btn.pin-on:hover { background: #dbeafe; border-color: var(--c-pin); color: var(--c-pin); }
.card-btn.copied { border-color: var(--c-ok); background: #dcfce7; color: var(--c-ok); opacity: 1; }
.card-btn svg { width: 12px; height: 12px; pointer-events: none; }

mark { background: #fef9c3; color: #854d0e; padding: 0 2px; border-radius: 3px; }
body.dark mark { background: #78350f; color: #fef08a; }
.link { color: var(--c-accent); text-decoration: none; word-break: break-all; }
.link:hover { text-decoration: underline; }

/* ════════════════════════════════════════════════════════
   EDIT MODE — RESIZE CARDS (OneNote-like)
════════════════════════════════════════════════════════ */

/* Active edit mode button — makes it look "toggled on" */
#editModeBtn.active {
  background: var(--c-accent);
  border-color: var(--c-accent);
  color: #fff;
  box-shadow: 0 1px 3px rgba(37,99,235,.3);
}
#editModeBtn.active:hover {
  background: var(--c-accent-h);
  border-color: var(--c-accent-h);
  color: #fff;
}

/* Edit mode: just visual indicators (dashed outline) + enable handles.
   The layout is already flex-wrap in normal mode, so no layout switch needed. */
#results.edit-mode .card {
  outline: 1.5px dashed var(--c-accent-b);
  outline-offset: 2px;
  cursor: default;
  /* Kill expensive transitions & animations during edit mode — drag must feel instant */
  transition: none !important;
  animation: none !important;
}
/* Neutralize hover lift that would otherwise fight with the drag */
#results.edit-mode .card:hover {
  outline-color: var(--c-accent);
  transform: none;
  box-shadow: var(--s-sm);
  border-color: var(--c-border);
}

/* Prevent hover actions from hiding while interacting with handles */
#results.edit-mode .card-actions { opacity: 1; }

/* Also kill button hover transforms in edit mode so hovering over cards mid-drag is cheap */
#results.edit-mode .card-btn,
#results.edit-mode .card-btn:hover {
  transition: none !important;
  transform: none !important;
}

/* Sizing behavior (applies always when inline size is set — even in normal view) */
.card[data-sized="1"] {
  min-width: 180px;
  min-height: 120px;
  overflow: hidden;
}
.card[data-sized="1"] .card-body {
  overflow: auto;
  max-height: 100%;
}

/* Resize handles (only shown in edit mode) */
.card-resize-handle {
  position: absolute;
  background: transparent;
  z-index: 5;
  display: none;
  touch-action: none;
}
#results.edit-mode .card-resize-handle { display: block; }

/* While a card is being resized, it's position:absolute (lifted out of flex flow).
   Its real width/height change → content stays crisp, no distortion.
   Siblings don't reflow because a placeholder holds the slot. */
.card.resizing {
  transition: none !important;
  box-shadow: var(--s-lg);
  z-index: 10;
}
#results.edit-mode .card.resizing { outline-color: var(--c-accent); }

.card-resize-handle.rh-r {
  right: -4px; top: 8px; bottom: 8px;
  width: 8px;
  cursor: ew-resize;
}
.card-resize-handle.rh-b {
  left: 8px; right: 8px; bottom: -4px;
  height: 8px;
  cursor: ns-resize;
}
.card-resize-handle.rh-br {
  right: -2px; bottom: -2px;
  width: 16px; height: 16px;
  cursor: nwse-resize;
  border-right: 2px solid var(--c-accent);
  border-bottom: 2px solid var(--c-accent);
  border-bottom-right-radius: 6px;
  opacity: 0;
  transition: opacity .12s;
}
#results.edit-mode .card:hover .card-resize-handle.rh-br,
#results.edit-mode .card-resize-handle.rh-br:hover,
.card.resizing .card-resize-handle.rh-br { opacity: 1; }

/* "Reset size" button — only visible in edit mode, when card has custom size */
.card-reset-size {
  display: none;
  position: absolute;
  top: 6px;
  right: 6px;
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 1px solid var(--c-border);
  background: var(--c-surface);
  color: var(--c-text3);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 6;
  padding: 0;
  transition: all .12s;
}
.card-reset-size:hover {
  border-color: var(--c-accent);
  color: var(--c-accent);
  background: var(--c-accent-l);
}
.card-reset-size svg { width: 11px; height: 11px; pointer-events: none; }
#results.edit-mode .card[data-sized="1"] .card-reset-size,
#results.edit-mode .card[data-positioned="1"] .card-reset-size { display: flex; }

/* Slightly different pin-label position in edit mode to avoid overlap */
#results.edit-mode .card .card-pin-label { right: 34px; }

/* Drag handle (6-dot grip) — only visible in edit mode */
.card-drag-handle {
  display: none;
  position: absolute;
  left: -2px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 36px;
  border-radius: 5px;
  cursor: grab;
  align-items: center;
  justify-content: center;
  color: var(--c-text3);
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  z-index: 6;
  user-select: none;
  touch-action: none;
  transition: background .12s, color .12s, border-color .12s;
}
.card-drag-handle:hover {
  background: var(--c-accent-l);
  border-color: var(--c-accent);
  color: var(--c-accent);
}
.card-drag-handle:active { cursor: grabbing; }
.card-drag-handle svg { width: 10px; height: 10px; pointer-events: none; }
#results.edit-mode .card .card-drag-handle { display: flex; }
/* Hide the handle while a search filter is active — reordering hidden items is confusing */
#results.edit-mode.filtered .card .card-drag-handle { display: none; }
#results.edit-mode .card .card-pin-label { left: auto; }

/* Smooth slide animation for cards shifting around to make room for the dragged one.
   Duration is exposed as a CSS variable so JS can shorten it for very large profiles.
   We deliberately do NOT set `will-change` here: with hundreds of cards, that would
   create a layer per card and consume a lot of GPU memory for no win. */
#results.dragging-active > .card:not(.dragging) {
  transition: transform var(--drag-tx-dur, .22s) cubic-bezier(.2,.8,.2,1);
}
#results.dragging-active > .card-drop-placeholder {
  transition: transform var(--drag-tx-dur, .22s) cubic-bezier(.2,.8,.2,1);
}

/* The card actually being dragged — floats above everything, follows the cursor */
.card.dragging {
  position: fixed !important;
  z-index: 100;
  pointer-events: none;
  cursor: grabbing !important;
  box-shadow: 0 16px 40px rgba(0,0,0,.18), 0 4px 12px rgba(0,0,0,.1);
  outline: 2px solid var(--c-accent) !important;
  outline-offset: 2px;
  transform: rotate(1.2deg);
  transition: none !important;
  opacity: .96;
  margin: 0 !important;
}

/* Placeholder slot — same dimensions as the dragged card, holds its spot in the flow */
.card-drop-placeholder {
  background: var(--c-accent-l, rgba(59,130,246,.08));
  border: 2px dashed var(--c-accent);
  border-radius: var(--r2);
  box-sizing: border-box;
  flex: 0 0 auto;
}

body.dragging-card,
body.dragging-card * { cursor: grabbing !important; user-select: none !important; }

/* While resizing, disable selection and hover effects everywhere */
body.resizing-card,
body.resizing-card * {
  user-select: none !important;
  cursor: nwse-resize !important;
}
body.resizing-card.resizing-w, body.resizing-card.resizing-w * { cursor: ew-resize !important; }
body.resizing-card.resizing-h, body.resizing-card.resizing-h * { cursor: ns-resize !important; }

/* Empty states */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 24px;
}
.empty-state-icon { font-size: 40px; margin-bottom: 14px; opacity: .4; }
.empty-state-title { font-size: 16px; font-weight: 600; color: var(--c-text2); margin-bottom: 6px; }
.empty-state-sub { font-size: 13px; color: var(--c-text3); max-width: 280px; margin: 0 auto; line-height: 1.55; }

/* ════════════════════════════════════════════════════════
   OVERLAY & MODALS
════════════════════════════════════════════════════════ */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(3px);
  z-index: 400;
}
.backdrop.off { display: none; }
body.dark .backdrop { background: rgba(0,0,0,.55); }

body.dark .p-row { color: var(--c-text2); }
body.dark .p-row:hover { background: var(--c-surf2); color: var(--c-text); }
body.dark .p-row-count {
  background: #333333;
  color: #c8c8c8;
  border: 1px solid #525252;
}
body.dark .p-row.active .p-row-count {
  background: rgba(59,130,246,.28);
  color: #93c5fd;
  border-color: rgba(59,130,246,.52);
}

.modal {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r2);
  z-index: 500;
  box-shadow: var(--s-lg);
  animation: modalIn .18s cubic-bezier(.34,1.4,.64,1);
}
@keyframes modalIn {
  from { opacity: 0; transform: translate(-50%,-50%) scale(.94); }
  to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}
.off { display: none !important; }

.m-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--c-border);
  background: var(--c-surf2);
  border-radius: var(--r2) var(--r2) 0 0;
}
.m-head h3 { font-size: 15px; font-weight: 600; color: var(--c-text); display: flex; align-items: center; gap: 8px; }
.m-body { padding: 20px; }
.m-foot { display: flex; gap: 8px; padding: 0 20px 20px; }

.x-btn {
  width: 26px; height: 26px;
  border: none; border-radius: 6px;
  background: var(--c-surf2);
  color: var(--c-text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all .12s;
  flex-shrink: 0; min-width: unset;
}
.x-btn:hover { background: var(--c-border); color: var(--c-text); transform: none; box-shadow: none; }

/* Card editor modal — ENLARGED */
#addModal {
  width: min(820px, calc(100vw - 24px));
  max-height: calc(100vh - 40px);
  padding: 0;
  overflow: hidden;
  display: flex; flex-direction: column;
}
#addModal .m-body {
  padding: 0 20px 12px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.rich-editor {
  width: 100%;
  min-height: 340px;
  max-height: calc(80vh - 220px);
  padding: 16px 18px;
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  font-family: 'Geist', sans-serif;
  font-size: 14.5px; line-height: 1.7;
  overflow-y: auto; outline: none;
  transition: border-color .15s, box-shadow .15s;
  background: var(--c-surf2);
  color: var(--c-text);
  word-wrap: break-word; cursor: text;
  flex: 1;
}
.rich-editor:focus { border-color: var(--c-accent); box-shadow: 0 0 0 3px var(--c-accent-l); background: var(--c-surface); }
.rich-editor:empty::before { content: attr(data-ph); color: var(--c-text3); pointer-events: none; }

/* ────────────────────────────────────────────
   Rich content styles — shared by editor + cards
   (applied via .rich-content wrapper)
──────────────────────────────────────────── */
.rich-content h1, .rich-content h2, .rich-content h3 {
  font-weight: 700; color: var(--c-text);
  line-height: 1.3; margin: 0.6em 0 0.3em;
}
.rich-content h1:first-child,
.rich-content h2:first-child,
.rich-content h3:first-child { margin-top: 0; }
.rich-content h1 { font-size: 1.55em; letter-spacing: -.01em; }
.rich-content h2 { font-size: 1.28em; letter-spacing: -.005em; }
.rich-content h3 { font-size: 1.1em; }

.rich-content ul, .rich-content ol {
  margin: 0.35em 0 0.5em;
  padding-left: 1.6em;
}
.rich-content ul { list-style: disc; }
.rich-content ol { list-style: decimal; }
.rich-content li {
  margin: 0.15em 0;
  line-height: 1.6;
}
.rich-content li::marker { color: var(--c-accent); }
.rich-content ul ul, .rich-content ol ol,
.rich-content ul ol, .rich-content ol ul { margin: 0.1em 0; }

.rich-content blockquote {
  border-left: 3px solid var(--c-accent);
  background: var(--c-accent-l);
  padding: 8px 14px;
  margin: 0.5em 0;
  border-radius: 0 var(--r) var(--r) 0;
  color: var(--c-text2);
  font-style: italic;
}

.rich-content code {
  font-family: 'Geist Mono', ui-monospace, Menlo, monospace;
  font-size: 0.9em;
  background: var(--c-surf2);
  border: 1px solid var(--c-border);
  padding: 1px 6px;
  border-radius: 4px;
  color: var(--c-text);
}
.rich-content pre {
  background: var(--c-surf2);
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  padding: 10px 12px;
  margin: 0.5em 0;
  overflow-x: auto;
  font-family: 'Geist Mono', ui-monospace, Menlo, monospace;
  font-size: 0.88em;
  line-height: 1.55;
  color: var(--c-text);
  white-space: pre;
}
.rich-content pre code {
  background: transparent;
  border: none;
  padding: 0;
  font-size: 1em;
}

.rich-content s, .rich-content strike, .rich-content del { text-decoration: line-through; }

/* Alignment applied via inline styles from execCommand('justify*') */
.rich-content [style*="text-align"] { display: block; }

/* Buttons */
.btn {
  padding: 8px 16px; border-radius: var(--r);
  border: 1px solid var(--c-border);
  background: var(--c-surface);
  color: var(--c-text);
  font-family: 'Geist', sans-serif;
  font-size: 13px; font-weight: 450;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all .12s;
}
.btn:hover { background: var(--c-surf2); border-color: var(--c-border2); transform: translateY(-1px); box-shadow: var(--s-sm); }
.btn-ok  { background: var(--c-ok); border-color: var(--c-ok); color: #fff; }
.btn-ok:hover { background: #15803d; border-color: #15803d; color: #fff; box-shadow: 0 3px 8px rgba(22,163,74,.3); }
.btn-del { background: var(--c-err); border-color: var(--c-err); color: #fff; }
.btn-del:hover { background: #b91c1c; border-color: #b91c1c; color: #fff; box-shadow: none; }
.btn-ghost { background: transparent; border-color: var(--c-border); color: var(--c-text2); }
.btn-ghost:hover { background: var(--c-surf2); color: var(--c-text); box-shadow: none; transform: none; }

/* Profile modal */
#profileModal { width: min(380px, calc(100vw - 24px)); padding: 0; overflow: hidden; }
.m-input {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--c-border); border-radius: var(--r);
  background: var(--c-surf2); color: var(--c-text);
  font-family: 'Geist', sans-serif; font-size: 14px;
  outline: none; transition: all .15s; margin-bottom: 16px;
}
.m-input:focus { border-color: var(--c-accent); box-shadow: 0 0 0 3px var(--c-accent-l); background: var(--c-surface); }
.m-input::placeholder { color: var(--c-text3); }

/* Settings modal */
#settingsModal { width: min(380px, calc(100vw - 24px)); padding: 0; overflow: hidden; max-height: 85vh; display: flex; flex-direction: column; }
.s-body { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
.s-group-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--c-text3); margin-bottom: 8px; }
.s-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--c-surf2); border: 1px solid var(--c-border); border-radius: var(--r); margin-bottom: 6px; }
.s-item-l { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--c-text); }
.lang-sel { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 6px; color: var(--c-text); font-size: 12px; padding: 4px 8px; cursor: pointer; outline: none; font-family: inherit; }
.lang-sel:focus { border-color: var(--c-accent); }

.stat-hero { background: linear-gradient(135deg, var(--c-accent), #1e40af); color: #fff; padding: 14px 16px; border-radius: var(--r); display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.stat-hero-lbl { font-size: 12px; opacity: .8; }
.stat-hero-val { font-size: 26px; font-weight: 700; font-family: 'Geist Mono', monospace; }
.stat-list { display: flex; flex-direction: column; gap: 4px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: var(--c-surf2); border: 1px solid var(--c-border); border-radius: var(--r); font-size: 12px; }
.stat-row-n { display: flex; align-items: center; gap: 6px; color: var(--c-text); font-weight: 500; }
.stat-row-c { background: var(--c-border); color: var(--c-text2); padding: 1px 7px; border-radius: 20px; font-size: 11px; font-family: 'Geist Mono', monospace; }

/* Share modal */
#shareModal { width: min(380px, calc(100vw - 24px)); padding: 0; overflow: hidden; }
.share-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.share-tabs { display: flex; gap: 4px; }
.s-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 8px; border: 1px solid var(--c-border); border-radius: var(--r); background: var(--c-surf2); color: var(--c-text2); cursor: pointer; font-size: 11px; font-weight: 500; font-family: inherit; transition: all .12s; }
.s-tab:hover { border-color: var(--c-accent); background: var(--c-accent-l); color: var(--c-accent); transform: none; box-shadow: none; }
.s-tab.on { border-color: var(--c-accent); background: var(--c-accent); color: #fff; }
.s-tab-icon { font-size: 18px; }
.share-panel { display: flex; flex-direction: column; gap: 10px; }
.share-instr { font-size: 12px; color: var(--c-text2); line-height: 1.5; }
.share-pbtn { width: 100%; padding: 10px; background: var(--c-accent); border: none; border-radius: var(--r); color: #fff; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .12s; }
.share-pbtn:hover:not(:disabled) { background: var(--c-accent-h); }
.share-pbtn:disabled { opacity: .4; cursor: not-allowed; }
.code-display { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.code-box { width: 100%; background: var(--c-surf2); border: 2px dashed var(--c-accent); border-radius: var(--r); padding: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; }
.peer-code { font-size: 28px; font-weight: 700; letter-spacing: 8px; font-family: 'Geist Mono', monospace; color: var(--c-accent); }
.copy-code-btn { background: none; border: none; font-size: 18px; cursor: pointer; opacity: .6; transition: opacity .12s; padding: 4px; min-width: unset; flex: none; }
.copy-code-btn:hover { opacity: 1; background: none; border: none; transform: none; box-shadow: none; }
.share-status { font-size: 12px; font-weight: 500; padding: 9px 12px; border-radius: var(--r); text-align: center; }
.share-status.waiting { background: var(--c-surf2); color: var(--c-text2); border: 1px solid var(--c-border); }
.share-status.success { background: #dcfce7; color: #15803d; }
.share-status.error   { background: #fee2e2; color: #991b1b; }
body.dark .share-status.success { background: rgba(22,163,74,.12); color: #4ade80; }
body.dark .share-status.error   { background: rgba(220,38,38,.12); color: #f87171; }
.ci-row { display: flex; gap: 8px; flex-wrap: wrap; }
.ci-row .peer-input { min-width: 100px; }
.ci-row .share-pbtn { width: auto; flex-shrink: 0; padding: 10px 14px; }
@media (max-width: 360px) {
  .ci-row { flex-direction: column; }
  .ci-row .share-pbtn { width: 100%; }
}
.peer-input { flex: 1; padding: 10px 12px; font-size: 18px; font-weight: 700; font-family: 'Geist Mono', monospace; letter-spacing: 5px; text-transform: uppercase; border: 1px solid var(--c-border); border-radius: var(--r); background: var(--c-surf2); color: var(--c-text); text-align: center; outline: none; transition: border-color .15s; }
.peer-input:focus { border-color: var(--c-accent); }

/* ════════════════════════════════════════════════════════
   FORMAT TOOLBAR
════════════════════════════════════════════════════════ */
/* ════════════════════════════════════════════════════════
   CARD COLOR PICKER (above toolbar in modal)
════════════════════════════════════════════════════════ */
.card-color-picker {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  margin: 12px 20px 0;
  background: var(--c-surf2);
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  flex-wrap: wrap;
}
.ccp-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--c-text3);
  margin-right: 4px;
  flex-shrink: 0;
}
.ccp-swatches {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.ccp-sw {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--c-border);
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  transition: transform .1s, border-color .1s;
  position: relative;
}
.ccp-sw:hover { transform: scale(1.12); border-color: var(--c-text3); }
.ccp-sw.on {
  border-color: var(--c-accent);
  transform: scale(1.1);
  box-shadow: 0 0 0 2px var(--c-accent-l);
}
.ccp-sw.on::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--c-accent);
  transform: translate(-50%,-50%);
}
/* Default / reset swatch */
.ccp-sw-default {
  background: var(--c-surface);
  display: flex; align-items: center; justify-content: center;
  color: var(--c-text3);
}
.ccp-sw-default svg { width: 12px; height: 12px; pointer-events: none; }

@media (max-width: 640px) {
  .card-color-picker { margin: 10px 12px 0; padding: 8px 10px; gap: 6px; }
  .ccp-sw { width: 22px; height: 22px; }
}

/* ════════════════════════════════════════════════════════
   FIXED EDITOR TOOLBAR (inside modal)
════════════════════════════════════════════════════════ */
.editor-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 3px;
  padding: 8px 12px;
  margin: 0 20px 12px;
  background: var(--c-surf2);
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  position: sticky;
  top: 0;
  z-index: 2;
}
.et-group {
  display: flex;
  align-items: center;
  gap: 2px;
}
.et-sep {
  width: 1px;
  height: 20px;
  background: var(--c-border);
  margin: 0 4px;
  flex-shrink: 0;
}
.et-btn {
  min-width: 30px;
  height: 30px;
  padding: 0 7px;
  border: 1px solid transparent;
  border-radius: 5px;
  background: transparent;
  color: var(--c-text2);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all .1s;
  flex-shrink: 0;
}
.et-btn svg { width: 14px; height: 14px; pointer-events: none; }
.et-btn:hover:not(:disabled) {
  background: var(--c-surface);
  border-color: var(--c-border);
  color: var(--c-text);
}
.et-btn.on {
  background: var(--c-accent-l);
  border-color: var(--c-accent-b);
  color: var(--c-accent);
}

/* Color swatches inside toolbar */
.et-swatches {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 0 2px;
}
.et-sw {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid transparent;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  transition: transform .1s;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
}
.et-sw:hover { transform: scale(1.25); border-color: rgba(0,0,0,.3); }
.et-sw.on { border-color: rgba(0,0,0,.4); transform: scale(1.15); }
.et-sw-reset {
  background: var(--c-surface) !important;
  border: 1.5px solid var(--c-border2) !important;
  color: var(--c-text3);
  display: flex; align-items: center; justify-content: center;
  box-shadow: none;
}
.et-sw-reset:hover { background: #fee2e2 !important; border-color: #fca5a5 !important; color: var(--c-err); transform: scale(1.1); }

.et-hl {
  width: 22px; height: 14px;
  border-radius: 3px;
  border: 1.5px solid transparent;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  transition: transform .1s;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
}
.et-hl:hover { transform: scale(1.15); border-color: rgba(0,0,0,.25); }
.et-hl.on { border-color: rgba(0,0,0,.35); }
.et-hl-reset {
  background: var(--c-surface) !important;
  border: 1.5px solid var(--c-border2) !important;
}
.et-hl-reset:hover { background: #fee2e2 !important; border-color: #fca5a5 !important; }

/* Responsive — stack nicely on small screens */
@media (max-width: 640px) {
  .editor-toolbar { margin: 0 12px 10px; padding: 6px 8px; }
  .et-btn { min-width: 28px; height: 28px; padding: 0 5px; font-size: 11px; }

  .et-sep { margin: 0 2px; }

}

function applyTheme(m){

    addClass(document.body,'custom');addClass($('btn-custom'),'on');$('logo-light').classList.remove('on');$('logo-dark').classList.add('on');

/* ════════════════════════════════════════════════════════
   CONTENT PROCESSING
════════════════════════════════════════════════════════ */
function walkMark(node,re){
  if(node.nodeType===3){if(!re.test(node.textContent))return;const f=document.createDocumentFragment();let li=0;node.textContent.replace(new RegExp(re.source,'gi'),(m,off)=>{if(off>li)f.appendChild(document.createTextNode(node.textContent.slice(li,off)));const mk=document.createElement('mark');mk.textContent=m;f.appendChild(mk);li=off+m.length;});if(li<node.textContent.length)f.appendChild(document.createTextNode(node.textContent.slice(li)));node.parentNode.replaceChild(f,node);return;}
  if(node.nodeName==='MARK'||node.nodeName==='A')return;Array.from(node.childNodes).forEach(c=>walkMark(c,re));
}
function linkify(node){
  if(node.nodeType===3){const re=/(https?:\/\/[^\s<]+)/g;if(!re.test(node.textContent))return;const f=document.createDocumentFragment();let li=0;node.textContent.replace(/(https?:\/\/[^\s<]+)/g,(u,p,off)=>{if(off>li)f.appendChild(document.createTextNode(node.textContent.slice(li,off)));const a=document.createElement('a');a.href=u;a.textContent=u;a.className='link';a.target='_blank';a.rel='noopener noreferrer';f.appendChild(a);li=off+u.length;});if(li<node.textContent.length)f.appendChild(document.createTextNode(node.textContent.slice(li)));node.parentNode.replaceChild(f,node);return;}
  if(node.nodeName==='A')return;Array.from(node.childNodes).forEach(c=>linkify(c));
}
function processContent(content,filter){
  const el=document.createElement('div');
  if(isRich(content)){el.innerHTML=content;linkify(el);}
  else{const urls=[];let tmp=content.replace(/(https?:\/\/[^\s]+)/g,m=>{urls.push(m);return`[[U${urls.length-1}]]`;});tmp=esc(tmp).replace(/\[\[U(\d+)\]\]/g,(m,id)=>{const u=urls[+id];return`<a href="${esc(u)}" target="_blank" rel="noopener noreferrer" class="link">${esc(u)}</a>`;}).replace(/\n/g,'<br>');el.innerHTML=tmp;}
  if(filter){const re=new RegExp(filter.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');walkMark(el,re);}
  return el.innerHTML;
}

/* ════════════════════════════════════════════════════════
   SYNC EXTENSION CHROME
════════════════════════════════════════════════════════ */
let QUERY_EXTENSION_ID = 'ejfjhpgngmaidniobgokmphlcbgfnofg';

// Promise qui se résout quand le content script de l'extension signale son ID.
// Permet d'utiliser le bon ID (utile en dev local où l'ID est aléatoire).
const _extensionReadyPromise = new Promise((resolve) => {
  // Si l'event a déjà été dispatché avant notre listener, on le rate.
  // Donc on écoute ET on timeout après 500ms (assez pour document_idle).
  const listener = (e) => {
    if (e.detail && e.detail.extensionId) {
      QUERY_EXTENSION_ID = e.detail.extensionId;
      console.log('[Query sync] ID mis à jour via content script:', QUERY_EXTENSION_ID);
    }
    window.removeEventListener('query-extension-ready', listener);
    resolve();
  };
  window.addEventListener('query-extension-ready', listener);
  // Timeout : si le content script ne répond pas, on utilise l'ID codé en dur
  setTimeout(() => {
    window.removeEventListener('query-extension-ready', listener);
    resolve();
  }, 800);
});

function isExtensionAvailable() {
  return typeof chrome !== 'undefined'
      && chrome.runtime
      && typeof chrome.runtime.sendMessage === 'function';
}

/**
 * Pull depuis l'extension au démarrage.
 * Retourne true si des profils ont été importés.
 */
function pullFromExtension() {
  return new Promise((resolve) => {
    if (!isExtensionAvailable()) {
      console.log('[Query sync] chrome.runtime indisponible');
      return resolve(false);
    }
    console.log('[Query sync] GET_PROFILES →', QUERY_EXTENSION_ID);
    try {
      chrome.runtime.sendMessage(
        QUERY_EXTENSION_ID,
        { type: 'GET_PROFILES' },
        (response) => {
          if (chrome.runtime.lastError) {
            console.warn('[Query sync] Erreur:', chrome.runtime.lastError.message);
            return resolve(false);
          }
          if (!response || !response.ok) {
            console.warn('[Query sync] Réponse invalide:', response);
            return resolve(false);
          }
          const extProfiles = response.data && response.data.profiles;
          if (!extProfiles || !Object.keys(extProfiles).length) {
            console.log('[Query sync] Aucun profil dans l\'extension');
            return resolve(false);
          }
          // Fusionner avec les profils existants (l'extension gagne)
          const d = load() || {};
          d.profiles = Object.assign({}, d.profiles || {}, extProfiles);
          if (response.data.currentProfile) d.currentPid = response.data.currentProfile;
          save(d);
          console.log('[Query sync]', Object.keys(extProfiles).length, 'profil(s) synchronisé(s)');
          resolve(true);
        }
      );
    } catch (e) {
      console.warn('[Query sync] Exception:', e);
      resolve(false);
    }
  });
}

/**
 * Push vers l'extension après chaque modification locale.
 */
function pushToExtension() {
  if (!isExtensionAvailable()) return;
  try {
    chrome.runtime.sendMessage(
      QUERY_EXTENSION_ID,
      { type: 'SYNC_PROFILES', payload: { profiles, currentProfile: currentPid } },
      () => { void chrome.runtime.lastError; }
    );
  } catch (e) { /* ignore */ }
}

// Écoute les mises à jour en temps réel via le content script
window.addEventListener('message', (event) => {
  if (event.source !== window) return;
  if (!event.data || event.data.source !== 'query-extension') return;
  if (event.data.type === 'PROFILES_UPDATED' && event.data.profiles) {
    console.log('[Query sync] Mise à jour reçue de l\'extension');
    profiles = event.data.profiles;
    // Normaliser les entries
    Object.keys(profiles).forEach(pid => {
      if (!Array.isArray(profiles[pid].entries)) profiles[pid].entries = [];
    });
    if (profiles[currentPid]) {
      entries = profiles[currentPid].entries;
    } else {
      currentPid = Object.keys(profiles)[0] || '';
      entries = profiles[currentPid] ? profiles[currentPid].entries : [];
    }
    const d = load() || {};
    d.profiles = profiles;
    d.currentPid = currentPid;
    save(d);
    renderSidebar();
    updateTopbar();
    render($('search').value);
  }
});

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
async function init(){
  // Attendre que le content script ait signalé l'ID (max 800ms)
  await _extensionReadyPromise;
  // Puis sync depuis l'extension
  try { await pullFromExtension(); } catch(e) { console.warn('[Query sync] Pull error:', e); }

  const d=load();
  // Logo init
  $('logo-light').classList.remove('on');$('logo-dark').classList.remove('on');
  if(d){
    lang=d.language||'en';themeMode=d.themeMode||'light';customColor=d.customColor||'#2563eb';
    $('colorPicker').value=customColor;applyTheme(themeMode);applyTr();$('langSelect').value=lang;
    if(d.profiles){
      profiles=d.profiles;
      Object.keys(profiles).forEach(pid=>{
        if(!Array.isArray(profiles[pid].entries))profiles[pid].entries=[];
        else profiles[pid].entries=profiles[pid].entries.map((e,i)=>{
          if(typeof e==='string')return{content:e,isPinned:false,createdAt:Date.now()+i};
          if(!e||typeof e!=='object')return null;
          const o={content:e.content||'',isPinned:!!e.isPinned,createdAt:e.createdAt||Date.now()};
          if(typeof e.w==='number'&&e.w>0)o.w=e.w;
          if(typeof e.h==='number'&&e.h>0)o.h=e.h;
          if(typeof e.x==='number')o.x=e.x;
          if(typeof e.y==='number')o.y=e.y;
          if(typeof e.color==='string'&&e.color)o.color=e.color;
          return o;
        }).filter(Boolean);
      });
    }else{startFirstProfile();return;}
    currentPid=d.currentPid||Object.keys(profiles)[0];
    if(!profiles[currentPid])currentPid=Object.keys(profiles)[0];
    entries=profiles[currentPid]?.entries||[];
    renderSidebar();updateTopbar();
    const ls=d.searches?.[currentPid]||'';$('search').value=ls;render(ls);
    setTimeout(()=>{const s=$('search');s.focus();if(s.value)s.setSelectionRange(s.value.length,s.value.length);},60);
  }else{applyTheme('light');applyTr();startFirstProfile();}
}

function updateCanvasHeight(){

    maxBottom=Math.max(maxBottom,c.offsetTop+c.offsetHeight);
  });

function render(filter=''){
  const res=$('results'),ctr=$('resultsCounter');res.innerHTML='';
  // Preserve edit-mode class on results container
  if(editMode)res.classList.add('edit-mode');else res.classList.remove('edit-mode');
  // Mark when a filter is active so drag handles can hide (reordering hidden items is confusing)
  if(filter)res.classList.add('filtered');else res.classList.remove('filtered');
  if(entries.length===0){res.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🗒️</div><div class="empty-state-title">${t('emptyTitle')}</div><div class="empty-state-sub">${t('emptySub')}</div></div>`;addClass(ctr,'off');updateCount();return;}
  let n=0;
  entries.forEach((entry,idx)=>{
    const ct=entry.content||'',target=isRich(ct)?ct.replace(/<[^>]+>/g,' '):ct;
    if(!target.toLowerCase().includes(filter.toLowerCase()))return;n++;
    const card=document.createElement('div');
    const colorClass=entry.color?' color-'+entry.color:'';
    card.className='card'+(entry.isPinned?' pinned':'')+colorClass;
    card.style.animationDelay=`${n*.025}s`;
    card.dataset.idx=idx;
    // Apply custom size if present
    const hasSize=(typeof entry.w==='number'&&entry.w>0)||(typeof entry.h==='number'&&entry.h>0);

    const hasPos=(typeof entry.x==='number')&&(typeof entry.y==='number');

    card.innerHTML=`<div class="card-pin-label">📌 Pinned</div>

    <button class="card-reset-size" data-r="reset-size" title="${t('resetSize')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 3 3 9 9 9"/></svg></button>
    <div class="card-body rich-content${isRich(ct)?'':' plain-text'}">${processContent(ct,filter)}</div><div class="card-footer"><span class="card-date">${fmtDate(entry.createdAt)}</span><div class="card-actions">
    <button class="card-btn${entry.isPinned?' pin-on':''}" data-r="pin" title="${entry.isPinned?t('unpin'):t('pin')}"><svg viewBox="0 0 24 24" fill="${entry.isPinned?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg></button>
    <button class="card-btn" data-r="copy" title="${t('copy')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
    <button class="card-btn" data-r="edit" title="${t('edit')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
    </div></div>
    <div class="card-resize-handle rh-r" data-r="resize-r"></div>
    <div class="card-resize-handle rh-b" data-r="resize-b"></div>
    <div class="card-resize-handle rh-br" data-r="resize-br"></div>`;
    card.querySelector('[data-r="pin"]').addEventListener('click',ev=>{ev.stopPropagation();togglePin(idx);});
    card.querySelector('[data-r="copy"]').addEventListener('click',ev=>{ev.stopPropagation();copyCard(entry,card);});
    card.querySelector('[data-r="edit"]').addEventListener('click',ev=>{ev.stopPropagation();editCard(idx);});
    card.querySelector('[data-r="reset-size"]').addEventListener('click',ev=>{ev.stopPropagation();resetCardSize(idx);});
    card.querySelector('[data-r="resize-r"]').addEventListener('pointerdown',ev=>startResize(ev,card,idx,'w'));
    card.querySelector('[data-r="resize-b"]').addEventListener('pointerdown',ev=>startResize(ev,card,idx,'h'));
    card.querySelector('[data-r="resize-br"]').addEventListener('pointerdown',ev=>startResize(ev,card,idx,'wh'));
    wireDragHandle(card,idx);
    res.appendChild(card);
  });
  if(filter){remClass(ctr,'off');ctr.textContent=t('resultsN',n);}else{addClass(ctr,'off');}
  updateCount();
  if(n===0&&filter)res.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">${t('noResultTitle')}</div><div class="empty-state-sub">${t('noResultSub')}</div></div>`;
  updateCanvasHeight();
}

function copyCard(entry,card){

function toggleEditMode(){
  editMode=!editMode;
  const btn=$('editModeBtn'),lbl=$('lbl-editmode'),res=$('results'),plist=$('profileList');
  if(editMode){btn.classList.add('active');res.classList.add('edit-mode');plist.classList.add('edit-mode');if(lbl)lbl.textContent=t('editModeExit');}
  else{btn.classList.remove('active');res.classList.remove('edit-mode');plist.classList.remove('edit-mode');if(lbl)lbl.textContent=t('editMode');}
  // No re-render: just toggle the class. All cards & handles already exist in the DOM.
}

function startProfileDrag(ev,pid,row){
  if(!editMode)return;
  ev.preventDefault();
  const list=$('profileList');
  let targetRow=null,insertBefore=true;
  row.classList.add('dragging-profile');
  const onMove=e=>{
    list.querySelectorAll('.p-row').forEach(r=>r.classList.remove('drag-over-before','drag-over-after'));
    const el=document.elementFromPoint(e.clientX,e.clientY)?.closest('.p-row');
    if(el&&el!==row&&list.contains(el)){
      const rect=el.getBoundingClientRect();
      insertBefore=e.clientY<rect.top+rect.height/2;
      el.classList.add(insertBefore?'drag-over-before':'drag-over-after');
      targetRow=el;
    }else{targetRow=null;}
  };
  const onUp=()=>{
    document.removeEventListener('pointermove',onMove);
    document.removeEventListener('pointerup',onUp);
    row.classList.remove('dragging-profile');
    list.querySelectorAll('.p-row').forEach(r=>r.classList.remove('drag-over-before','drag-over-after'));
    if(targetRow){const tpid=targetRow.dataset.pid;if(tpid&&tpid!==pid)reorderProfiles(pid,tpid,insertBefore);}
  };
  document.addEventListener('pointermove',onMove);
  document.addEventListener('pointerup',onUp);
}

function reorderProfiles(draggedPid,targetPid,insertBefore){
  const keys=Object.keys(profiles);
  const fromIdx=keys.indexOf(draggedPid);if(fromIdx===-1)return;
  keys.splice(fromIdx,1);
  const toIdx=keys.indexOf(targetPid);if(toIdx===-1)return;
  keys.splice(insertBefore?toIdx:toIdx+1,0,draggedPid);
  const reordered={};keys.forEach(k=>{reordered[k]=profiles[k];});
  profiles=reordered;persist();renderSidebar();
}

function resetCardSize(idx){
  const e=entries[idx];if(!e)return;
  delete e.w;delete e.h;
  delete e.x;delete e.y;
  profiles[currentPid].entries=entries;persist();
  const card=document.querySelector(`#results .card[data-idx="${idx}"]`);
  if(card){card.style.width='';card.style.height='';card.style.left='';card.style.top='';card.removeAttribute('data-sized');card.removeAttribute('data-positioned');}
  updateCanvasHeight();
}

function startResize(ev,card,idx,axis){
  if(!editMode)return;
  ev.preventDefault();ev.stopPropagation();
  const entry=entries[idx];if(!entry)return;
  const wasPositioned=card.dataset.positioned==='1';
  const rect=card.getBoundingClientRect();
  const parent=card.parentElement;
  const parentRect=parent.getBoundingClientRect();
  const startX=ev.clientX,startY=ev.clientY;
  const startW=rect.width,startH=rect.height;
  const MIN_W=180,MIN_H=120,MAX_W=1200,MAX_H=1600;

  // For flex cards: insert a placeholder to keep the slot while the card is lifted out.
  // For already-positioned (absolute) cards: skip the placeholder (they're already out of flow).
  let placeholder=null;
  if(!wasPositioned){
    placeholder=document.createElement('div');
    placeholder.style.width=startW+'px';
    placeholder.style.height=startH+'px';
    placeholder.style.flex='0 0 auto';
    placeholder.style.visibility='hidden';
    placeholder.className='card-placeholder';
    card.parentNode.insertBefore(placeholder,card);
  }

  // Pin the card where it currently is, using absolute positioning within the container.
  // Its real width/height will actually change during drag → content stays crisp, no distortion.
  const topInParent=rect.top-parentRect.top+parent.scrollTop;
  const leftInParent=rect.left-parentRect.left+parent.scrollLeft;
  // Parent needs to be a positioning context
  const prevParentPosition=parent.style.position;
  if(getComputedStyle(parent).position==='static')parent.style.position='relative';

  card.style.position='absolute';
  card.style.top=topInParent+'px';
  card.style.left=leftInParent+'px';
  card.style.width=startW+'px';
  card.style.height=startH+'px';
  card.style.margin='0';
  card.dataset.sized='1';

  card.classList.add('resizing');
  document.body.classList.add('resizing-card');
  if(axis==='w')document.body.classList.add('resizing-w');
  else if(axis==='h')document.body.classList.add('resizing-h');

  const handle=ev.currentTarget;
  if(handle.setPointerCapture&&ev.pointerId!=null){try{handle.setPointerCapture(ev.pointerId);}catch(_){}}

  // rAF-throttled width/height write. Because card is position:absolute, changing its
  // width/height only causes ITS OWN layout to recompute — not the 300+ siblings in the flex.
  let pendingW=startW,pendingH=startH,rafId=0,dirty=false;
  const flush=()=>{
    rafId=0;
    if(!dirty)return;
    dirty=false;
    if(axis==='w'||axis==='wh')card.style.width=pendingW+'px';
    if(axis==='h'||axis==='wh')card.style.height=pendingH+'px';
  };
  const onMove=e=>{
    if(axis==='w'||axis==='wh')pendingW=Math.max(MIN_W,Math.min(MAX_W,startW+(e.clientX-startX)));
    if(axis==='h'||axis==='wh')pendingH=Math.max(MIN_H,Math.min(MAX_H,startH+(e.clientY-startY)));
    dirty=true;
    if(!rafId)rafId=requestAnimationFrame(flush);
  };
  const onUp=e=>{
    if(rafId){cancelAnimationFrame(rafId);flush();}
    document.removeEventListener('pointermove',onMove);
    document.removeEventListener('pointerup',onUp);
    document.removeEventListener('pointercancel',onUp);
    if(handle.releasePointerCapture&&ev.pointerId!=null){try{handle.releasePointerCapture(ev.pointerId);}catch(_){}}

    // STEP 2: restore the card to its layout state after resizing.
    card.style.position='';
    // For positioned cards, keep left/top; for flex cards, clear them.
    if(wasPositioned){card.style.top=entry.y+'px';card.style.left=entry.x+'px';}
    else{card.style.top='';card.style.left='';}
    card.style.margin='';
    // width/height are kept (they're the new size to persist)
    if(!wasPositioned&&placeholder&&placeholder.parentNode)placeholder.parentNode.removeChild(placeholder);
    if(!wasPositioned&&parent.style.position!==prevParentPosition)parent.style.position=prevParentPosition;

    card.classList.remove('resizing');
    document.body.classList.remove('resizing-card','resizing-w','resizing-h');

    // Persist final size
    if(axis==='w'||axis==='wh')entry.w=Math.round(pendingW);
    if(axis==='h'||axis==='wh')entry.h=Math.round(pendingH);
    profiles[currentPid].entries=entries;persist();
  };
  document.addEventListener('pointermove',onMove,{passive:true});
  document.addEventListener('pointerup',onUp);
  document.addEventListener('pointercancel',onUp);
}

/* ════════════════════════════════════════════════════════
   EDIT MODE — FREE DRAG TO POSITION CARDS
   - Activated by the 6-dot grip handle (edit mode only)
   - Drops the card at any x/y in the results canvas (position: absolute)
   - On release: saves entry.x / entry.y, locks current width (entry.w)
   - Reset button clears x/y/w/h and returns card to flex flow
   - pointermove throttled to one rAF update per frame for smooth 60fps
════════════════════════════════════════════════════════ */
const _drag={active:false};

function wireDragHandle(card,idx){
  const handle=card.querySelector('[data-r="drag"]');
  if(!handle)return;
  handle.addEventListener('pointerdown',ev=>startCardDrag(ev,card,idx));
  handle.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();});
}

function startCardDrag(ev,card,idx){
  if(!editMode)return;
  if(ev.button!==undefined&&ev.button!==0)return;
  ev.preventDefault();ev.stopPropagation();

  const container=$('results');
  const srcEntry=entries[idx];if(!srcEntry)return;

  // Snapshot starting geometry
  const rect=card.getBoundingClientRect();
  const offsetX=ev.clientX-rect.left;
  const offsetY=ev.clientY-rect.top;

  // Lift the card to a fixed overlay (follows the cursor)
  card.classList.add('dragging');
  card.style.width=rect.width+'px';
  card.style.height=rect.height+'px';
  card.style.left=rect.left+'px';
  card.style.top=rect.top+'px';
  document.body.appendChild(card);
  document.body.classList.add('dragging-card');
  _drag.active=true;

  let pendingX=ev.clientX,pendingY=ev.clientY,rafId=0;
  const tick=()=>{
    rafId=0;
    card.style.left=(pendingX-offsetX)+'px';
    card.style.top=(pendingY-offsetY)+'px';
    const SCROLL_ZONE=60,SCROLL_SPEED=14,vh=window.innerHeight;
    if(pendingY<SCROLL_ZONE)window.scrollBy(0,-SCROLL_SPEED);
    else if(pendingY>vh-SCROLL_ZONE)window.scrollBy(0,SCROLL_SPEED);
  };
  const onMove=e=>{
    pendingX=e.clientX;pendingY=e.clientY;
    if(!rafId)rafId=requestAnimationFrame(tick);
  };

  const onUp=()=>{
    if(rafId){cancelAnimationFrame(rafId);rafId=0;}
    document.removeEventListener('pointermove',onMove);
    document.removeEventListener('pointerup',onUp);
    document.removeEventListener('pointercancel',onUp);
    document.body.classList.remove('dragging-card');
    _drag.active=false;

    // Compute final position relative to the results container
    const cRect=container.getBoundingClientRect();
    const x=Math.round(Math.max(0,(pendingX-offsetX)-cRect.left+container.scrollLeft));
    const y=Math.round(Math.max(0,(pendingY-offsetY)-cRect.top+container.scrollTop));

    // Return card to DOM before re-render
    card.classList.remove('dragging');
    card.style.cssText='';
    if(card.parentNode===document.body)document.body.removeChild(card);

    // Save free position (and lock current width so the card doesn't lose its flex size)
    srcEntry.x=x;srcEntry.y=y;
    if(!srcEntry.w)srcEntry.w=Math.round(rect.width);
    profiles[currentPid].entries=entries;persist();
    render($('search').value);
  };

  document.addEventListener('pointermove',onMove,{passive:true});
  document.addEventListener('pointerup',onUp);
  document.addEventListener('pointercancel',onUp);

  // First frame: place the floating card under the cursor
  card.style.left=(ev.clientX-offsetX)+'px';
  card.style.top=(ev.clientY-offsetY)+'px';
}

    const o={content:e.content,isPinned:e.isPinned||false,createdAt:e.createdAt};
    if(typeof e.w==='number'&&e.w>0)o.w=e.w;
    if(typeof e.h==='number'&&e.h>0)o.h=e.h;
    if(typeof e.x==='number')o.x=e.x;
    if(typeof e.y==='number')o.y=e.y;
    if(typeof e.color==='string'&&e.color)o.color=e.color;
    return o;
  })};
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'}));a.download=`${name}.json`;a.click();
});

// Import — supports multiple files; for each file:
//   - if a profile with the same name exists → replace its entries
//   - otherwise → create a new profile
$('importBtn').addEventListener('click',()=>$('importFile').click());
$('importFile').addEventListener('change',async e=>{
  const files=Array.from(e.target.files||[]);if(!files.length)return;
  const now=Date.now();
  // Normalize a single entry (string or object) into the canonical entry shape
  const normalizeEntry=(x,i)=>{
    if(x==null)return null;
    if(typeof x==='string')return{content:x,isPinned:false,createdAt:now+i};
    if(typeof x!=='object')return null;
    const o={content:x.content||'',isPinned:x.isPinned||false,createdAt:x.createdAt||now+i};
    if(typeof x.w==='number'&&x.w>0)o.w=x.w;
    if(typeof x.h==='number'&&x.h>0)o.h=x.h;
    if(typeof x.x==='number')o.x=x.x;
    if(typeof x.y==='number')o.y=x.y;
    if(typeof x.color==='string'&&x.color)o.color=x.color;
    return o;
  };
  // Find an existing profile id by case-insensitive name match
  const findPidByName=(name)=>{
    const ln=name.toLowerCase();
    return Object.keys(profiles).find(pid=>profiles[pid].name.toLowerCase()===ln)||null;
  };
  // Make a fresh profile id from a name
  const makePid=(name)=>{
    let pid=`${name.toLowerCase().replace(/[^a-z0-9]/g,'_')}_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    while(profiles[pid])pid=`${pid}_x`;
    return pid;
  };
  // Parse one file → list of {name, entries} candidate profiles
  const parseFile=async(file)=>{
    const txt=await file.text();
    const parsed=JSON.parse(txt);
    const baseName=(file.name||'').replace(/\.json$/i,'')||t('defaultProfile');
    // Single-profile export ({profile, entries})
    if(parsed&&Array.isArray(parsed.entries)){
      return [{
        name:(parsed.profile||baseName).toString().slice(0,60),
        entries:parsed.entries.map(normalizeEntry).filter(Boolean)
      }];
    }
    // Bare array of entries → use filename as profile name
    if(Array.isArray(parsed)){
      return [{name:baseName.slice(0,60),entries:parsed.map(normalizeEntry).filter(Boolean)}];
    }
    throw new Error('Invalid JSON');
  };

  // Parse every file first so we can show a single confirm with the totals
  const candidates=[];const failed=[];
  for(const f of files){
    try{const arr=await parseFile(f);candidates.push(...arr);}
    catch{failed.push(f.name);}
  }
  if(!candidates.length){
    alert(t('errImport')+(failed.length?`\n(${failed.join(', ')})`:''));
    e.target.value='';return;
  }
  if(!confirm(t('importMulti',candidates.length,files.length))){e.target.value='';return;}

  // Apply each candidate: replace if name exists, else create
  const replaced=[],created=[];let lastPid=currentPid;
  for(const c of candidates){
    const existingPid=findPidByName(c.name);
    if(existingPid){
      profiles[existingPid].entries=c.entries;
      lastPid=existingPid;
      replaced.push(c.name);
    }else{
      const pid=makePid(c.name);
      profiles[pid]={name:c.name,entries:c.entries};
      lastPid=pid;
      created.push(c.name);
    }
  }
  persist();
  // Switch to the last imported profile so the user sees the result
  switchProfile(lastPid);
  renderSidebar();
  e.target.value='';

  // Friendly summary
  const okCount=candidates.length,failCount=failed.length;
  const msg=failCount?t('importPartial',okCount,failCount):t('importDone',okCount);
  alert(msg);
});
